<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goaly - Offline</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
          "Segoe UI Symbol";
        background-color: #f9fafb;
        color: #1f2937;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
      }
      .container {
        background-color: #ffffff;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        max-width: 400px;
        width: 100%;
        border: 1px solid #f3f4f6;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 12px;
        color: #111827;
      }
      p {
        font-size: 16px;
        color: #4b5563;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .icon {
        font-size: 48px;
        color: #9ca3af;
        margin-bottom: 16px;
      }
      .retry-btn {
        background-color: #005f6a;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s;
      }
      .retry-btn:hover {
        background-color: #004f5a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🔌</div>
      <h1>You're Offline</h1>
      <p>
        Goaly requires an internet connection to sync your goals and track your
        progress. Please check your connection and try again.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        Try Again
      </button>
    </div>
  </body>
</html>
